<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genéticas do Breeder – PhenoBrasil</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global.css">
<style>
/* Estilos específicos do breeder-strains */
.breeder-hero { background: linear-gradient(135deg, #0d0d0d 0%, #1a2a1a 50%, #0d0d0d 100%); border-bottom: 1px solid var(--border); padding: 3rem 2rem; }
.breeder-hero-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: flex-start; gap: 2rem; }
.breeder-avatar { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); background: var(--bg3); flex-shrink: 0; }
.social-links { display: flex; gap: 0.6rem; margin-top: 1rem; flex-wrap: wrap; }
 
 
.breeder-info h1 { font-family: 'Barlow Condensed'; font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; text-transform: uppercase; line-height: 1; }
.breeder-badge { display: inline-block; margin-top: 0.7rem; background: var(--green); padding: 0.2rem 0.7rem; border-radius: 2px; font-family: 'Barlow Condensed'; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
.breeder-count { margin-top: 0.5rem; color: var(--muted); font-size: 0.9rem; }
.breeder-bio-wrap { margin-top: 0.8rem; padding: 0.75rem 1rem; background: rgba(0,0,0,0.35); border: 1px solid var(--border); border-radius: 2px; max-width: 600px; }
.breeder-bio-label { font-family: 'Barlow Condensed'; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold); margin-bottom: 0.35rem; }
.breeder-bio-text { color: #ccc; font-size: 0.88rem; line-height: 1.6; }
@media (max-width: 768px) { .breeder-hero-inner { flex-direction: column; text-align: center; } .product-footer { flex-direction: column; align-items: flex-start; gap: 1rem; } }
</style>
</head>
<body>
 
<section class="breeder-hero">
  <div class="breeder-hero-inner">
    <img id="breeder-avatar" class="breeder-avatar" src="" alt="Breeder">
    <div class="breeder-info">
      <h1 id="breeder-name">Carregando...</h1>
      <div class="breeder-badge">✅ Breeder Verificado</div>
      <div id="breeder-count" class="breeder-count"></div>
      <div id="breeder-bio-wrap" class="breeder-bio-wrap" style="display:none">
        <div class="breeder-bio-label">Sobre o Breeder</div>
        <div id="breeder-bio" class="breeder-bio-text"></div>
      </div>
      <div id="social-links" class="social-links"></div>
    </div>
  </div>
</section>
 
<div class="main-wrap">
  <div class="section-head">
    <h2>Genéticas de <span id="breeder-title-name">...</span></h2>
  </div>
  <div id="product-grid" class="product-grid">
    <p class="state-msg">Carregando...</p>
  </div>
</div>
 
<script type="module">
  import { renderNav, initCarrinho, initAuth } from './nav.js';
  import { renderFooter } from './footer.js';
  import { getBreederComStrains } from './data.js';
 
  renderNav('Breeders');
  initCarrinho();
  initAuth();
  renderFooter();
 
  const breederId = new URLSearchParams(window.location.search).get('id');
  const grid      = document.getElementById('product-grid');
 
  const init = async () => {
    if (!breederId) {
      grid.innerHTML = '<p class="state-err">Breeder não encontrado.</p>';
      return;
    }
 
    try {
      const { breeder, strains } = await getBreederComStrains(breederId);
 
      // Preenche hero
      if (breeder) {
        const nome = breeder.name || 'Breeder';
        document.title = `${nome} – PhenoBrasil`;
        document.getElementById('breeder-name').textContent       = nome;
        document.getElementById('breeder-title-name').textContent = nome;
        document.getElementById('breeder-avatar').src             = breeder.avatar;
 
        // Redes sociais
        const socialWrap = document.getElementById('social-links');
        const svgs = {
          instagram: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7.0301.084c-1.2768.0602-2.1487.264-2.911.5634-.7888.3075-1.4575.72-2.1228 1.3877-.6652.6677-1.075 1.3368-1.3802 2.127-.2954.7638-.4956 1.6365-.552 2.914-.0564 1.2775-.0689 1.6882-.0626 4.947.0062 3.2586.0206 3.6671.0825 4.9473.061 1.2765.264 2.1482.5635 2.9107.308.7889.72 1.4573 1.388 2.1228.6679.6655 1.3365 1.0743 2.1285 1.38.7632.295 1.6361.4961 2.9134.552 1.2773.056 1.6884.069 4.9462.0627 3.2578-.0062 3.668-.0207 4.9478-.0814 1.28-.0607 2.147-.2652 2.9098-.5633.7889-.3086 1.4578-.72 2.1228-1.3881.665-.6682 1.0745-1.3378 1.3795-2.1284.2957-.7632.4966-1.636.552-2.9124.056-1.2809.0692-1.6898.063-4.948-.0063-3.2583-.021-3.6668-.0817-4.9465-.0607-1.2797-.264-2.1487-.5633-2.9117-.3084-.7889-.72-1.4568-1.3876-2.1228C21.2982 1.33 20.628.9208 19.8378.6165 19.074.321 18.2017.1197 16.9244.0645 15.6471.0093 15.236-.005 11.977.0014 8.718.0076 8.31.0215 7.0301.0839m.1402 21.6932c-1.17-.0509-1.8053-.2453-2.2287-.408-.5606-.216-.96-.4771-1.3819-.895-.422-.4178-.6811-.8186-.9-1.378-.1644-.4234-.3624-1.058-.4171-2.228-.0595-1.2645-.072-1.6442-.079-4.848-.007-3.2037.0053-3.583.0607-4.848.05-1.169.2456-1.805.408-2.2282.216-.5613.4762-.96.895-1.3816.4188-.4217.8184-.6814 1.3783-.9003.423-.1651 1.0575-.3614 2.227-.4171 1.2655-.06 1.6447-.072 4.848-.079 3.2033-.007 3.5835.005 4.8495.0608 1.169.0508 1.8053.2445 2.228.408.5608.216.96.4754 1.3816.895.4217.4194.6816.8176.9005 1.3787.1653.4217.3617 1.056.4169 2.2263.0602 1.2655.0739 1.645.0796 4.848.0058 3.203-.0055 3.5834-.061 4.848-.051 1.17-.245 1.8055-.408 2.2294-.216.5604-.4763.96-.8954 1.3814-.419.4215-.8181.6811-1.3783.9-.4224.1649-1.0577.3617-2.2262.4174-1.2656.0595-1.6448.072-4.8493.079-3.2045.007-3.5825-.006-4.848-.0608M16.953 5.5864A1.44 1.44 0 1 0 18.39 4.144a1.44 1.44 0 0 0-1.437 1.4424M5.8385 12.012c.0067 3.4032 2.7706 6.1557 6.173 6.1493 3.4026-.0065 6.157-2.7701 6.1506-6.1733-.0065-3.4032-2.771-6.1565-6.174-6.1498-3.403.0067-6.156 2.771-6.1496 6.1738M8 12.0077a4 4 0 1 1 4.008 3.9921A3.9996 3.9996 0 0 1 8 12.0077"/></svg>`,
          youtube:   `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`,
          twitter:   `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14.234 10.162 22.977 0h-2.072l-7.591 8.824L7.251 0H.258l9.168 13.343L.258 24H2.33l8.016-9.318L16.749 24h6.993zm-2.837 3.299-.929-1.329L3.076 1.56h3.182l5.965 8.532.929 1.329 7.754 11.09h-3.182z"/></svg>`,
          facebook:  `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`,
        };
        const redes = [
          { key: 'instagram', label: 'Instagram', cls: 'social-btn--instagram' },
          { key: 'youtube',   label: 'YouTube',   cls: 'social-btn--youtube'   },
          { key: 'twitter',   label: '',         cls: 'social-btn--twitter'   },
          { key: 'facebook',  label: 'Facebook',  cls: 'social-btn--facebook'  },
        ];
        redes.forEach(({ key, label, cls }) => {
          const url = breeder[key];
          if (!url) return;
          const a = document.createElement('a');
          a.className  = `social-btn ${cls}`;
          a.href       = url;
          a.target     = '_blank';
          a.rel        = 'noopener noreferrer';
          a.innerHTML  = `${svgs[key]}<span>${label}</span>`;
          socialWrap.appendChild(a);
        });
 
        // Bio
        if (breeder.bio) {
          document.getElementById('breeder-bio').textContent      = breeder.bio;
          document.getElementById('breeder-bio-wrap').style.display = 'block';
        }
      }
 
      document.getElementById('breeder-count').textContent =
        `${strains.length} strain${strains.length !== 1 ? 's' : ''} cadastrada${strains.length !== 1 ? 's' : ''}`;
 
      if (!strains.length) {
        grid.innerHTML = '<p class="state-msg">Nenhuma strain cadastrada.</p>';
        return;
      }
 
      grid.innerHTML = '';
      strains.forEach(p => {
        const precoNum = p.price || 0;
        const imgSafe  = (p.image || '').replace(/'/g, '');
        const nameSafe = (p.name  || '').replace(/'/g, '&#39;');
        const typeSafe = (p.type  || '').replace(/'/g, '&#39;');
 
        const esgotado = p.status === 'esgotado' || p.status === 'inativo' || p.estoque === 0;
        const baixo    = !esgotado && p.estoque !== undefined && p.estoque <= 3;
 
        const btnCarrinho = esgotado
          ? `<button class="btn-cart" disabled style="background:var(--bg3);color:var(--muted);border:1px solid var(--border);cursor:not-allowed;">Esgotado</button>`
          : `<button class="btn-cart" data-product-id="${p.id}"
              onclick="window.adicionarAoCarrinho('${p.id}','${nameSafe}','${typeSafe}',${precoNum},'${imgSafe}')">
              + Carrinho
            </button>`;
 
        const estoqueTag = esgotado
          ? `<span style="font-size:0.72rem;color:var(--red);font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;">❌ Esgotado</span>`
          : baixo
          ? `<span style="font-size:0.72rem;color:var(--gold);font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;">⚠️ Últimas ${p.estoque}</span>`
          : '';
 
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <img class="product-img" src="${p.image || ''}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/250'">
          <div class="product-body">
            <div class="product-type">${p.type || ''}${p.flow ? ' • ' + p.flow : ''}${p.thc ? ' • THC ' + p.thc : ''}</div>
            <div class="product-name">${p.name || 'Sem nome'}</div>
            ${estoqueTag}
            <div class="product-footer">
              <span class="product-price">R$ ${precoNum.toFixed(2).replace('.', ',')}</span>
              <div class="product-actions">
                ${btnCarrinho}
                <a href="strain.html?id=${p.id}" class="btn-view">Ver</a>
              </div>
            </div>
          </div>`;
        grid.appendChild(card);
      });
 
    } catch (err) {
      console.error(err);
      grid.innerHTML = '<p class="state-err">Erro ao carregar strains.</p>';
    }
  };
 
  init();
</script>
</body>
</html>
