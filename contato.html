<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato – PhenoBrasil</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global.css">
<style>
/* Estilos específicos da página de contato */
.contact-section { max-width: 1100px; margin: 4rem auto; padding: 0 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
@media (max-width: 768px) { .contact-section { grid-template-columns: 1fr; gap: 2.5rem; } }

.contact-tag { display: inline-block; background: var(--green); color: #fff; font-family: 'Barlow Condensed'; font-size: 0.75rem; font-weight: 700; padding: 0.2rem 0.7rem; text-transform: uppercase; border-radius: 2px; margin-bottom: 1rem; letter-spacing: 0.08em; }
.contact-info h2 { font-family: 'Barlow Condensed'; font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; text-transform: uppercase; line-height: 1; margin-bottom: 1rem; }
.contact-info h2 em { color: var(--gold); font-style: normal; }
.contact-info > p { color: var(--muted); font-size: 0.95rem; line-height: 1.7; margin-bottom: 2rem; }

.contact-items { display: flex; flex-direction: column; gap: 1rem; }
.contact-item { background: var(--bg2); border: 1px solid var(--border); padding: 1rem 1.2rem; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s; }
.contact-item:hover { border-color: var(--gold); }
.contact-item span { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; }
.contact-item a { color: var(--white); text-decoration: none; font-family: 'Barlow Condensed'; font-size: 1rem; font-weight: 700; transition: color 0.2s; }
.contact-item a:hover { color: var(--gold); }

.contact-form { background: var(--bg2); border: 1px solid var(--border); border-top: 3px solid var(--gold); padding: 2rem; border-radius: 4px; display: flex; flex-direction: column; gap: 1rem; }
.contact-form input, .contact-form textarea { background: var(--bg3); border: 1px solid var(--border); color: var(--white); padding: 0.8rem 1rem; font-family: 'Barlow', sans-serif; font-size: 0.9rem; border-radius: 2px; outline: none; width: 100%; transition: border-color 0.2s; }
.contact-form input:focus, .contact-form textarea:focus { border-color: var(--gold); }
.contact-form textarea { min-height: 140px; resize: vertical; }
.contact-form button { background: var(--green); color: #fff; border: none; padding: 0.9rem; font-family: 'Barlow Condensed'; font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; border-radius: 2px; transition: background 0.2s; }
.contact-form button:hover { background: var(--green2); }
.contact-form button:disabled { opacity: 0.6; cursor: not-allowed; }
</style>
</head>
<body>

<section class="contact-section">
  <div class="contact-info">
    <span class="contact-tag">Contato</span>
    <h2>Fale com a <em>PhenoBrasil</em></h2>
    <p>Entre em contato para dúvidas sobre genética, catálogo disponível, coleções exclusivas e informações gerais.</p>
    <div class="contact-items">
      <div class="contact-item">
        <span>Instagram</span>
        <a href="https://instagram.com/" target="_blank">@phenobrasil</a>
      </div>
      <div class="contact-item">
        <span>Email</span>
        <a href="mailto:contato@phenobrasil.com">contato@phenobrasil.com</a>
      </div>
      <div class="contact-item">
        <span>WhatsApp</span>
        <a href="https://wa.me/5551999999999" target="_blank">+55 (51) 99999-9999</a>
      </div>
    </div>
  </div>

  <form class="contact-form" onsubmit="window.enviarMensagem(event)">
    <input type="text"  id="c-nome"     placeholder="Seu nome"     required>
    <input type="email" id="c-email"    placeholder="Seu email"    required>
    <textarea           id="c-mensagem" placeholder="Sua mensagem" required></textarea>
    <button type="submit" id="btn-enviar">Enviar Mensagem</button>
  </form>
</section>

<script type="module">
  import { renderNav, initCarrinho, initAuth } from './nav.js';
  import { renderFooter } from './footer.js';

  renderNav('Contato');
  initCarrinho();
  initAuth();
  renderFooter();

  window.enviarMensagem = (e) => {
    e.preventDefault();
    const nome     = document.getElementById('c-nome').value.trim();
    const email    = document.getElementById('c-email').value.trim();
    const mensagem = document.getElementById('c-mensagem').value.trim();
    const btn      = document.getElementById('btn-enviar');
    const texto    = `Olá PhenoBrasil! 👋\n\nNome: ${nome}\nEmail: ${email}\n\nMensagem:\n${mensagem}`;
    window.open(`https://wa.me/5551999999999?text=${encodeURIComponent(texto)}`, '_blank');
    btn.textContent = '✅ Enviado!';
    btn.disabled = true;
    setTimeout(() => { btn.textContent = 'Enviar Mensagem'; btn.disabled = false; e.target.reset(); }, 3000);
  };
</script>
</body>
</html>
